name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish"
        required: true
        default: "v0.2.1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: golang:1.24-bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Test
        run: go test ./...

      - name: Build Linux amd64 plugin
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build \
            -buildvcs=false \
            -buildmode=c-shared \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/xai-autoban-linux-amd64.so \
            .
          sha256sum dist/xai-autoban-linux-amd64.so > dist/SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/xai-autoban-linux-amd64.so
            dist/SHA256SUMS
